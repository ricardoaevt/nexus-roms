name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - build-name: nexus-roms-linux
            platform: linux/amd64
            os: ubuntu-latest
          - build-name: nexus-roms-windows
            platform: windows/amd64
            os: windows-latest
          - build-name: nexus-roms-macos
            platform: darwin/universal
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev pkg-config build-essential

      - name: Build Wails App
        shell: bash
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform ${{ matrix.platform }} -clean -tags webkit2gtk_41

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path build/bin/nexus-roms.exe -DestinationPath nexus-roms-windows.zip

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          chmod +x build/bin/nexus-roms
          zip -j nexus-roms-linux.zip build/bin/nexus-roms
          tar -czf nexus-roms-linux.tar.gz -C build/bin nexus-roms

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          zip -r nexus-roms-macos.zip build/bin/nexus-roms.app

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
